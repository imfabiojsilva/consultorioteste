<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!--
    OPEN GRAPH DINÂMICO:
    O WhatsApp/Telegram lê estas tags quando alguém partilha o link.
    São preenchidas via JavaScript após carregar o products.json.
    NOTA: Algumas apps (WhatsApp) fazem scraping server-side e podem não
    executar JS — para preview perfeito no WhatsApp precisarias de servidor.
    No entanto o redirecionamento para a Amazon funciona sempre.
  -->

  <!-- Tags base (serão atualizadas pelo JS) -->
  <meta property="og:type" content="product"/>
  <meta property="og:site_name" content="PromoDeals 🔥"/>
  <meta id="og-title"       property="og:title"       content="Promoção Amazon 🔥"/>
  <meta id="og-description" property="og:description" content="Clica para ver a promoção na Amazon"/>
  <meta id="og-image"       property="og:image"       content=""/>
  <meta id="og-url"         property="og:url"         content=""/>
  <meta name="twitter:card" content="summary_large_image"/>

  <title id="page-title">A carregar promoção... 🔥</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0f;--card:#1a1a24;--border:#2a2a3a;--accent:#ff4d1c;--accent2:#ff8c42;--gold:#ffd166;--text:#f0f0f5;--muted:#7a7a9a;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .wrap{max-width:400px;width:100%;text-align:center;}
    .logo{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:var(--muted);margin-bottom:28px;letter-spacing:1.5px;text-transform:uppercase;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:22px;overflow:hidden;margin-bottom:18px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .img-wrap{aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    .img-wrap img{width:100%;height:100%;object-fit:contain;padding:16px;}
    .img-wrap .emoji-fb{font-size:4rem;position:absolute;display:none;}
    .info{padding:20px;}
    .cat{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);background:rgba(255,77,28,.1);border:1px solid rgba(255,77,28,.2);padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:10px;}
    .title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;line-height:1.35;margin-bottom:14px;}
    .price-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
    .p-now{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:var(--accent);}
    .p-old{font-size:.88rem;color:var(--muted);text-decoration:line-through;}
    .p-disc{background:var(--gold);color:#000;font-size:.76rem;font-weight:700;padding:4px 10px;border-radius:8px;}
    .msg{color:var(--muted);font-size:.8rem;margin-bottom:12px;}
    .bar-wrap{background:#1a1a24;border-radius:100px;height:5px;overflow:hidden;margin-bottom:22px;}
    .bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;width:0%;transition:width .1s linear;}
    .btn{display:block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:.9rem;padding:14px;border-radius:13px;text-decoration:none;font-family:'DM Sans',sans-serif;box-shadow:0 4px 18px rgba(255,77,28,.35);transition:opacity .2s;border:none;cursor:pointer;width:100%;}
    .btn:hover{opacity:.88;}
    .disclaimer{font-size:.67rem;color:var(--muted);margin-top:14px;line-height:1.7;}
    .disclaimer a{color:var(--accent);text-decoration:none;}

    /* loading state */
    .skeleton{background:linear-gradient(90deg,#1a1a24 25%,#222230 50%,#1a1a24 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">🔥 PromoDeals</div>
  <div class="card" id="card">
    <div class="img-wrap" id="img-wrap">
      <div style="width:100%;height:100%;min-height:200px" class="skeleton"></div>
    </div>
    <div class="info" id="info">
      <div style="height:14px;border-radius:6px;margin-bottom:10px;width:60%" class="skeleton"></div>
      <div style="height:20px;border-radius:6px;margin-bottom:8px" class="skeleton"></div>
      <div style="height:20px;border-radius:6px;width:70%" class="skeleton"></div>
    </div>
  </div>
  <div class="msg" id="msg">A carregar produto...</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <button class="btn" id="btn" onclick="goNow()" disabled>🛒 Ver na Amazon</button>
  <div class="disclaimer">
    Como Associado Amazon, ganho comissão pelas compras que cumpram os requisitos.<br/>
    <a href="/">← Ver todas as promoções</a>
  </div>
</div>

<script>
  const AFFILIATE_TAG = 'Consultorio0b-21';
  const AMAZON_DOMAIN = 'amazon.es';

  let amazonUrl = '';

  // Ler ASIN do URL
  const params = new URLSearchParams(window.location.search);
  const asin = (params.get('asin') || '').toUpperCase().trim();

  if (!asin) {
    window.location.href = '/';
  }

  function buildAmazonUrl(asin) {
    return `https://www.${AMAZON_DOMAIN}/dp/${asin}?tag=${AFFILIATE_TAG}`;
  }

  function goNow() {
    if (amazonUrl) window.location.href = amazonUrl;
  }

  function disc(p,o) {
    const pn=parseFloat(p), po=parseFloat(o);
    if(!po||po<=pn) return null;
    return Math.round(((po-pn)/po)*100);
  }

  function tryImages(img, asin) {
    const urls = [
      `https://images-na.ssl-images-amazon.com/images/P/${asin}.01.LZZZZZZZ.jpg`,
      `https://images-na.ssl-images-amazon.com/images/P/${asin}.jpg`,
      `https://m.media-amazon.com/images/P/${asin}.jpg`,
    ];
    let idx = 0;
    img.onload = () => { img.style.opacity = '1'; };
    img.onerror = () => {
      idx++;
      if (idx < urls.length) { img.src = urls[idx]; }
      else {
        img.style.display = 'none';
        document.querySelector('.emoji-fb').style.display = 'flex';
      }
    };
    img.style.opacity = '0';
    img.style.transition = 'opacity .3s';
    img.src = urls[0];
  }

  // Barra de progresso
  let progress = 0;
  const barEl = document.getElementById('bar');
  const barInterval = setInterval(() => {
    progress = Math.min(progress + 2, 90);
    barEl.style.width = progress + '%';
  }, 30);

  async function init() {
    amazonUrl = buildAmazonUrl(asin);
    document.getElementById('btn').disabled = false;

    // Tentar carregar dados do produto
    let product = null;
    try {
      const r = await fetch('/products.json?t=' + Date.now());
      const products = await r.json();
      product = products.find(p => p.asin && p.asin.toUpperCase() === asin);
    } catch(e) {}

    // Completar barra
    clearInterval(barInterval);
    barEl.style.transition = 'width .3s';
    barEl.style.width = '100%';

    const title    = product ? product.title    : 'Produto Amazon';
    const price    = product ? product.price    : null;
    const oldPrice = product ? product.oldPrice : null;
    const category = product ? product.category : 'Promoção';
    const emoji    = product ? (product.emoji || '🛍️') : '🛍️';
    const d        = disc(price, oldPrice);

    // Atualizar página
    document.getElementById('page-title').textContent = `${emoji} ${title}${price ? ' — €'+price : ''}`;

    // Renderizar card
    document.getElementById('img-wrap').innerHTML = `
      <img id="prod-img" alt="${title}" style="opacity:0"/>
      <div class="emoji-fb">${emoji}</div>`;
    tryImages(document.getElementById('prod-img'), asin);

    document.getElementById('info').innerHTML = `
      <div class="cat">${category}</div>
      <div class="title">${title}</div>
      ${price ? `<div class="price-row">
        <span class="p-now">€${price}</span>
        ${oldPrice?`<span class="p-old">€${oldPrice}</span>`:''}
        ${d?`<span class="p-disc">-${d}%</span>`:''}
      </div>` : ''}`;

    document.getElementById('msg').textContent = 'A redirecionar para a Amazon...';

    // Redirecionar automaticamente após 1.5s
    setTimeout(() => {
      window.location.href = amazonUrl;
    }, 1500);
  }

  init();
</script>
</body>
</html>
