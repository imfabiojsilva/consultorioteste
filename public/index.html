<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PromoDeals 🔥 — Melhores Promoções Amazon</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;--accent:#ff4d1c;--accent2:#ff8c42;--gold:#ffd166;--text:#f0f0f5;--muted:#7a7a9a;--green:#06d6a0;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
    header{padding:18px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(255,77,28,.07) 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;display:flex;align-items:center;gap:9px;}
    .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;box-shadow:0 0 16px rgba(255,77,28,.4);}
    .live{display:flex;align-items:center;gap:6px;background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.25);color:var(--green);font-size:.72rem;font-weight:700;padding:5px 12px;border-radius:100px;}
    .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .hero{text-align:center;padding:42px 24px 30px;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(255,77,28,.09) 0%,transparent 70%);}
    .hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:800;line-height:1.1;letter-spacing:-1px;margin-bottom:10px;}
    .hero h1 span{background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero p{color:var(--muted);font-size:.92rem;max-width:380px;margin:0 auto 20px;line-height:1.6;}
    .strip{display:inline-flex;gap:18px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:9px 22px;font-size:.8rem;color:var(--muted);}
    .strip strong{color:var(--accent);}
    .filters{padding:0 24px 20px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
    .fbtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:100px;font-size:.76rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;}
    .fbtn:hover,.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px;padding:0 24px 32px;max-width:1200px;margin:0 auto;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:transform .22s,border-color .22s,box-shadow .22s;display:flex;flex-direction:column;animation:up .35s ease both;text-decoration:none;color:inherit;cursor:pointer;}
    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card:hover{transform:translateY(-4px);border-color:rgba(255,77,28,.4);box-shadow:0 10px 32px rgba(255,77,28,.14);}
    .card-img{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);overflow:hidden;position:relative;}
    .card-img img{width:100%;height:100%;object-fit:contain;padding:16px;}
    .card-img .emoji-fb{font-size:3rem;position:absolute;}
    .card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;}
    .tags{display:flex;gap:5px;flex-wrap:wrap;}
    .tag{font-size:.65rem;font-weight:700;padding:3px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;}
    .tag-cat{background:rgba(255,77,28,.1);color:var(--accent2);border:1px solid rgba(255,77,28,.18);}
    .tag-hot{background:rgba(255,77,28,.85);color:#fff;}
    .tag-new{background:rgba(6,214,160,.12);color:var(--green);border:1px solid rgba(6,214,160,.22);}
    .card-title{font-weight:600;font-size:.88rem;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .price-row{display:flex;align-items:baseline;gap:8px;margin-top:auto;}
    .p-now{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent);}
    .p-old{font-size:.8rem;color:var(--muted);text-decoration:line-through;}
    .p-disc{margin-left:auto;background:var(--gold);color:#000;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:7px;}
    .btn-az{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;font-size:.84rem;padding:10px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 3px 12px rgba(255,77,28,.28);transition:opacity .2s;}
    .btn-az:hover{opacity:.88;}
    .empty{grid-column:1/-1;text-align:center;padding:52px 20px;color:var(--muted);}
    .empty span{font-size:2.2rem;display:block;margin-bottom:12px;}
    footer{text-align:center;padding:20px;color:var(--muted);font-size:.71rem;border-top:1px solid var(--border);line-height:1.9;}
    footer a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🔥</div>PromoDeals</div>
  <div class="live"><div class="live-dot"></div>AO VIVO</div>
</header>
<div class="hero">
  <h1>As melhores<br/><span>promoções Amazon</span></h1>
  <p>Preços mínimos históricos, selecionados todos os dias.</p>
  <div class="strip">🔥 <strong id="count">0</strong> deals ativos &nbsp;·&nbsp; ⚡ Atualizado hoje</div>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<footer>
  Como Associado Amazon, ganho uma comissão pelas compras que cumpram os requisitos.<br/>
  Os preços podem variar. Verifica sempre o preço final na <a href="https://www.amazon.es" target="_blank">Amazon</a>.
</footer>
<script>
  const AFFILIATE_TAG = 'Consultorio0b-21';
  const AMAZON_DOMAIN = 'amazon.es';

  function disc(p,o){const pn=parseFloat(p),po=parseFloat(o);if(!po||po<=pn)return null;return Math.round(((po-pn)/po)*100);}

  function goTo(asin){
    window.location.href = 'go.html?asin=' + asin;
  }

  // Tenta múltiplas URLs de imagem da Amazon
  function tryImages(img, asin, emoji) {
    const urls = [
      `https://images-na.ssl-images-amazon.com/images/P/${asin}.01.LZZZZZZZ.jpg`,
      `https://images-na.ssl-images-amazon.com/images/P/${asin}.jpg`,
      `https://m.media-amazon.com/images/P/${asin}.jpg`,
    ];
    let idx = 0;
    img.onerror = function() {
      idx++;
      if (idx < urls.length) {
        img.src = urls[idx];
      } else {
        img.style.display = 'none';
        img.nextElementSibling.style.display = 'flex';
      }
    };
    img.src = urls[0];
  }

  async function render(filter) {
    filter = filter || 'all';
    let products = [];
    try {
      const r = await fetch('/products.json?t=' + Date.now());
      products = await r.json();
    } catch(e) {}

    document.getElementById('count').textContent = products.length;
    const cats = ['all', ...new Set(products.map(p => p.category))];
    document.getElementById('filters').innerHTML = cats.map(c =>
      `<button class="fbtn ${c===filter?'active':''}" onclick="render('${c}')">${c==='all'?'Todos':c}</button>`
    ).join('');

    const filtered = filter==='all' ? products : products.filter(p => p.category===filter);
    const grid = document.getElementById('grid');

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty"><span>😔</span>Sem promoções ainda.</div>`;
      return;
    }

    grid.innerHTML = filtered.map((p,i) => {
      const d = disc(p.price, p.oldPrice);
      return `
        <div class="card" style="animation-delay:${i*.05}s" onclick="goTo('${p.asin}')">
          <div class="card-img">
            <img id="img-${p.asin}" alt="${p.title}"/>
            <div class="emoji-fb" style="display:none">${p.emoji||'🛍️'}</div>
          </div>
          <div class="card-body">
            <div class="tags">
              <span class="tag tag-cat">${p.category}</span>
              ${p.badge==='hot'?'<span class="tag tag-hot">🔥 HOT</span>':''}
              ${p.badge==='new'?'<span class="tag tag-new">✨ NOVO</span>':''}
            </div>
            <div class="card-title">${p.title}</div>
            <div class="price-row">
              <span class="p-now">€${p.price}</span>
              ${p.oldPrice?`<span class="p-old">€${p.oldPrice}</span>`:''}
              ${d?`<span class="p-disc">-${d}%</span>`:''}
            </div>
            <button class="btn-az">🛒 Ver na Amazon</button>
          </div>
        </div>`;
    }).join('');

    // Carregar imagens após render
    filtered.forEach(p => {
      const img = document.getElementById('img-' + p.asin);
      if (img) tryImages(img, p.asin, p.emoji||'🛍️');
    });
  }

  render();
</script>
</body>
</html>
